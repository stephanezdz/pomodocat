name: Release PomodoCat

# Trigger:
#   - push of a tag like v0.1.0  → build all platforms + create a GitHub Release
#   - manually via the Actions tab
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14            # Apple Silicon runner
            args: --target aarch64-apple-darwin
          - platform: macos-13            # Intel runner
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: tauri

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: "PomodoCat ${{ github.ref_name }}"
          releaseBody: |
            ## PomodoCat ${{ github.ref_name }}

            ### Téléchargement direct
            - **macOS Apple Silicon** : `PomodoCat_*_aarch64.dmg`
            - **macOS Intel** : `PomodoCat_*_x64.dmg`
            - **Windows x64** : `PomodoCat_*_x64-setup.exe` ou `PomodoCat_*_x64_en-US.msi`

            ### Installation pour testeurs (sans toolchain)
            - **macOS** : télécharge `install-mac.command`, double-clic
            - **Windows** : télécharge `install-windows.bat`, double-clic

            Les chats `.webm` sont aussi joints à la release pour que les installeurs les téléchargent automatiquement.

            Voir [tauri/README.md](https://github.com/${{ github.repository }}/blob/main/tauri/README.md).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Upload the user-facing install scripts + cat videos to the same release.
      # Only one job needs to do this — we pick macos-14 because it's the first
      # to finish in the matrix.
      - name: Upload installers and cat videos
        if: matrix.platform == 'macos-14'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          # Find the release ID created by tauri-action.
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.id')
          echo "Release ID: $RELEASE_ID"

          # Helper that uploads via the gh CLI.
          upload() {
            local f="$1"
            [[ -f "$f" ]] || { echo "skip: $f not found"; return; }
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
          }

          upload "tauri/installers/install-mac.command"
          upload "tauri/installers/install-windows.bat"
          upload "tauri/installers/install-windows.ps1"

          # Cat videos live in the workflow checkout under tauri/sample-cats/.
          for f in tauri/sample-cats/*.webm tauri/sample-cats/*.mov; do
            upload "$f"
          done
